name: Reporte de bug
description: Reporta un problema reproducible en la app o el repo.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar. No incluyas datos personales, teléfonos,
        direcciones privadas, coordenadas sensibles, fotos privadas, secretos ni
        dumps. Si el problema expone datos sensibles, usa SECURITY.md.
  - type: textarea
    id: descripcion
    attributes:
      label: Descripción
      description: Qué ocurre y dónde lo ves.
      placeholder: En la página /..., al hacer ..., ocurre ...
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a ...
        2. Hacer clic en ...
        3. Ver error ...
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Resultado esperado
      description: Qué debería pasar.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
      description: Qué pasa realmente. Redacta cualquier dato sensible.
    validations:
      required: true
  - type: dropdown
    id: impacto
    attributes:
      label: Impacto
      options:
        - Bloquea un flujo crítico
        - Afecta datos/reportes
        - Afecta UI o accesibilidad
        - Afecta documentación
        - Otro
    validations:
      required: true
  - type: textarea
    id: contexto
    attributes:
      label: Contexto técnico
      description: Navegador, dispositivo, ruta, commit, entorno o logs sin secretos.
  - type: checkboxes
    id: privacidad
    attributes:
      label: Revisión de privacidad
      options:
        - label: No incluí datos personales, coordenadas sensibles, fotos privadas ni secretos.
          required: true
