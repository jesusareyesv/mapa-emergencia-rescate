# Gated schema-migrate Job — aplica las migraciones de Drizzle ANTES del roll.
#
# El esquema ya NO se crea de forma perezosa (se eliminó el ensureSchema() de
# lib/*). La fuente de verdad es infra/db/schema.ts; drizzle-kit genera los .sql
# en infra/db/migrations/ y este Job los aplica con el migrator de drizzle-orm
# (`npm run migrate` -> worker/migrate.ts). Idempotente: registra lo aplicado en
# __drizzle_migrations y salta lo ya aplicado, así que es seguro re-correrlo.
#
# Usa la imagen BACKEND (lleva node_modules + tsx + pg + drizzle + los .sql, y el
# script `npm run migrate`). Es el MISMO artefacto que la API y el worker, así que
# el esquema que migra coincide exactamente con el código que va a rodar.
#
# El workflow (deploy-hetzner.yml) lo corre y BLOQUEA el roll de la app hasta que
# complete (kubectl wait --for=condition=complete). CI le pone el nombre
# migrate-<sha> (inmutable por deploy) y le inyecta la imagen :<sha>.
#
# Regla expand-contract: las migraciones deben ser compatibles hacia atrás — los
# pods viejos siguen sirviendo durante el roll, así que el esquema nuevo tiene
# que funcionar con el código viejo.
apiVersion: batch/v1
kind: Job
metadata:
  # CI reemplaza este nombre por migrate-<sha> (inmutable por deploy).
  name: migrate
  namespace: mapa
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: { app: mapa, role: migrate }
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      restartPolicy: Never
      containers:
        - name: migrate
          # CI reemplaza el tag por la imagen -backend:<sha> del deploy.
          image: ghcr.io/OWNER/REPO-backend:latest
          command: ["npm", "run", "migrate"]
          # WORKDIR del backend = /app/backend, pero los .sql viven en
          # /app/infra/db/migrations -> apuntamos MIGRATIONS_DIR un nivel arriba.
          env:
            - name: MIGRATIONS_DIR
              value: "../infra/db/migrations"
            # Superadmin semilla del motor de auth (idempotente: solo crea si no
            # existe, nunca pisa una cuenta). SEED_ADMIN_EMAIL/PASSWORD viven en
            # el secret app-env (CI los parchea). Sin ellos, seedAuth siembra el
            # rol "admin" + capacidades pero NO crea usuario. Opcionales -> el Job
            # no falla si faltan (optional:true).
            - name: SEED_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-env
                  key: SEED_ADMIN_EMAIL
                  optional: true
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-env
                  key: SEED_ADMIN_PASSWORD
                  optional: true
          envFrom:
            - secretRef:
                name: app-env # DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
