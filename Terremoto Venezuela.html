    var donado = 187;     // USD donados hasta ahora
    var meta = 800;       // USD necesarios este mes
    var pct = Math.min(100, Math.round(donado / meta * 100));
    var barColor = pct < 40 ? '#EF4444' : pct < 75 ? '#F59E0B' : '#22C55E';

    var gastos = [
      { label: 'Servidores (AWS)', monto: '$320/mes' },
      { label: 'Dominio + CDN', monto: '$45/mes' },
      { label: 'SMS de alerta', monto: '$210/mes' },
      { label: 'Soporte voluntario', monto: '$225/mes' }
    ];

    tooltip.innerHTML = [
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">',
        '<strong style="font-size:14px">Ayúdanos a seguir activos</strong>',
        '<button id="__donate-detail-btn" style="background:none;border:none;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;padding:2px 4px;text-decoration:underline;font-family:system-ui">Ver gastos</button>',
      '</div>',

      // Progress bar
      '<div style="margin-bottom:14px">',

        '</div>',
        '<div style="background:rgba(255,255,255,.12);border-radius:99px;height:8px;overflow:hidden">',
          '<div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:99px;transition:width .6s ease"></div>',
        '</div>',
        '<div style="font-size:11px;opacity:.5;margin-top:4px">'+pct+'% de la meta mensual · '+( meta - donado > 0 ? '$'+(meta-donado)+' pendientes' : '¡Meta alcanzada! 🎉' )+'</div>',

        '<div style="display:flex;justify-content:space-between;padding:6px 0 0;font-weight:700"><span>Total</span><span>$'+meta+'/mes</span></div>',
      '</div>',

      '<p style="margin:0 0 11px;opacity:.8;font-size:12.5px;line-height:1.5">Plataforma 100% gratuita creada por voluntarios. Tu donación mantiene a familias conectadas durante la emergencia.</p>',

      '<div class="tip-links">',
        '<a href="https://paypal.me/respondeve" target="_blank" rel="noopener" style="background:#003087 !important">',
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.59 3.025-2.566 6.082-8.558 6.082H9.828L8.6 19.337h3.65l.524-3.329h1.99c4.065 0 7.169-1.668 8.09-6.364.562-2.899-.297-4.398-1.632-4.727z"/></svg>',
          'Donar con PayPal',
        '</a>',
        '<a href="https://buy.stripe.com/respondeve" target="_blank" rel="noopener" style="background:#635BFF !important">',
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M13.976 9.15c-2.172-.806-3.356-1.426-3.356-2.409 0-.831.683-1.305 1.901-1.305 2.227 0 4.515.858 6.09 1.631l.89-5.494C18.252.975 15.697 0 12.165 0 9.667 0 7.589.654 6.104 1.872 4.56 3.147 3.757 4.992 3.757 7.218c0 4.039 2.467 5.76 6.476 7.219 2.585.831 3.47 1.426 3.47 2.338 0 .914-.796 1.391-2.108 1.391-2.168 0-4.853-.965-6.753-2.169L3.952 21.21C5.851 22.479 8.738 23.5 12.165 23.5c2.613 0 4.807-.6 6.307-1.82 1.582-1.288 2.358-3.157 2.358-5.384 0-4.097-2.53-5.875-6.854-7.146z"/></svg>',
          'Donar con tarjeta (Stripe)',
        '</a>',
      '</div>',
      '<div style="font-size:11px;opacity:.45;margin-top:9px;text-align:center">Pago seguro · Puedes donar desde cualquier país</div>',
      '<div class="tip-caret"></div>'
    ].join('');

    // Toggle gastos detail
    setTimeout(function() {
      var db = document.getElementById('__donate-detail-btn');
      var dg = document.getElementById('__donate-gastos');

        db.addEventListener('click', function(e) {
          e.stopPropagation();
          var isOpen = dg.style.display !== 'none';
          dg.style.display = isOpen ? 'none' : 'block';
          db.textContent = isOpen ? 'Ver gastos' : 'Ocultar';
        });
      }
    }, 50);

    var btn = document.createElement('button');
    btn.id = '__donate-btn';
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Apoya Responde';

    var open = false;
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      open = !open;
      tooltip.style.display = open ? 'block' : 'none';
    });
    document.addEventListener('click', function() {
      open = false;
      tooltip.style.display = 'none';
    });
    tooltip.addEventListener('click', function(e) { e.stopPropagation(); });

    fab.appendChild(tooltip);
    fab.appendChild(btn);
    document.body.appendChild(fab);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mountDonate);
  } else {
    setTimeout(mountDonate, 600);
  }
})();
