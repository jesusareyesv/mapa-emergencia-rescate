  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 = dark-base */\n  --qi-ink-700:        #354552;  /* = dark-capa-2 */\n  --qi-ink-500:        #5C6B77;  /* = dark-capa-3 */\n  --qi-ink-300:        #8DA3B2;\n  --qi-ink-100:        #D6DBDF;  /* = light-capa-3 */\n  --qi-ink-50:         #E6EAEC;  /* = light-capa-2 */\n  --qi-bg:             #F7F8F9;  /* = light-capa-1 */\n  --qi-bg-elev:        #FFFFFF;\n  --qi-border:         #E6EAEC;  /* = light-capa-2 */\n  --qi-border-strong:  #D6DBDF;  /* = light-capa-3 */\n\n  /* ---- Semantic surfaces ------------------------------------------- */\n  --qi-surface:            var(--qi-white);\n  --qi-surface-muted:      var(--qi-bg);\n  --qi-surface-dark:       var(--qi-azul-score);\n  --qi-surface-inverse-fg: var(--qi-white);\n\n  /* ---- Semantic text (NEVER orange per brandbook p.19) ------------- */\n  --qi-fg:              var(--qi-azul-score);\n  --qi-fg-muted:        var(--qi-ink-500);\n  --qi-fg-subtle:       var(--qi-ink-300);\n  --qi-fg-inverse:      var(--qi-white);\n  --qi-fg-accent:       var(--qi-azul-accion);\n  --qi-fg-secondary:    var(--qi-azul);\n  --qi-fg-on-dark:      var(--qi-white);\n  --qi-fg-on-accent:    var(--qi-white);\n\n  /* ---- Borders / dividers ------------------------------------------ */\n  --qi-divider:         var(--qi-border);\n  --qi-divider-strong:  var(--qi-border-strong);\n  --qi-focus-ring:      color-mix(in oklab, var(--qi-azul-accion) 45%, transparent);\n\n  /* ---- Graphic accents (icons, charts, decorations — never text) --- */\n  --qi-accent-warm:     var(--qi-naranja-frec);\n  --qi-accent-soft:     var(--qi-naranja-latido);\n\n  /* ---- Semantic feedback colors (Figma · 2026-06) ------------------ */\n  /* Warning — atención / valores a vigilar */\n  --qi-warning-surface: #F8F0E0;\n  --qi-warning:         #FBB658;   /* base · 500 */\n  --qi-warning-strong:  #FF9646;   /* 600 */\n  /* Success — en rango / confirmación */\n  --qi-success-surface: #EAFEF7;\n  --qi-success:         #4BE6B0;   /* base · 400 */\n  --qi-success-strong:  #14C578;   /* 600 */\n  /* Error — crítico / fuera de rango */\n  --qi-error-surface:   #F9DFE3;\n  --qi-error:           #FC5260;   /* base · 400 */\n  --qi-error-mid:       #DC4A58;   /* 500 */\n  --qi-error-strong:    #A8000F;   /* 700 */\n  /* Info — usa el azul de marca */\n  --qi-info-surface:    #E6F3FF;\n  --qi-info:            #1A98FF;\n\n  /* ---- Typography families ----------------------------------------- */\n  --qi-font-display: 'Stara', 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;\n  --qi-font-body:    'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --qi-font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* ---- Type scale (digital; brandbook print specs scaled down) ----- */\n  --qi-text-display: clamp(3.5rem, 8vw, 6rem);   /* Stara Medium, hero titles */\n  --qi-text-h1:      clamp(2.25rem, 4.5vw, 3.25rem);\n  --qi-text-h2:      clamp(1.75rem, 3vw, 2.25rem);\n  --qi-text-h3:      1.5rem;\n  --qi-text-h4:      1.25rem;\n  --qi-text-lg:      1.125rem;\n  --qi-text-body:    1rem;\n  --qi-text-sm:      0.875rem;\n  --qi-text-xs:      0.75rem;\n\n  /* ---- Leading ----------------------------------------------------- */\n  --qi-leading-tight:   1.08;\n  --qi-leading-snug:    1.2;\n  --qi-leading-normal:  1.45;\n  --qi-leading-loose:   1.6;\n\n  /* ---- Tracking ---------------------------------------------------- */\n  --qi-tracking-tight:  -0.02em;\n  --qi-tracking-normal: 0;\n  --qi-tracking-wide:   0.04em;\n  --qi-tracking-cap:    0.12em;\n\n  /* ---- Spacing (proportional diagramación — X, X/2, X/4) ---------- */\n  --qi-x:      64px;       /* base unit \"X\" from brandbook */\n  --qi-x-half: 32px;       /* X/2 */\n  --qi-x-qtr:  16px;       /* X/4 */\n  --qi-x-eig:  8px;        /* X/8 — practical small unit */\n  --qi-x-2:    128px;      /* 2X */\n\n  --qi-space-1:  4px;\n  --qi-space-2:  8px;\n  --qi-space-3:  12px;\n  --qi-space-4:  16px;\n  --qi-space-5:  24px;\n  --qi-space-6:  32px;\n  --qi-space-7:  48px;\n  --qi-space-8:  64px;\n  --qi-space-9:  96px;\n  --qi-space-10: 128px;\n\n  /* ---- Radii (pills + soft cards; app uses rounded corners 16/32) -- */\n  --qi-radius-xs:   4px;\n  --qi-radius-sm:   8px;\n  --qi-radius-md:   12px;\n  --qi-radius-lg:   16px;\n  --qi-radius-xl:   24px;\n  --qi-radius-2xl:  32px;   /* bottom-sheet style, used in app login */\n  --qi-radius-pill: 999px;\n\n  /* ---- Elevation (soft, tuned to azul-score shadow) ---------------- */\n  --qi-shadow-xs:  0 1px 2px rgba(9, 35, 52, 0.06);\n  --qi-shadow-sm:  0 2px 6px rgba(9, 35, 52, 0.08);\n  --qi-shadow-md:  0 8px 20px rgba(9, 35, 52, 0.10);\n  --qi-shadow-lg:  0 20px 40px rgba(9, 35, 52, 0.14);\n  --qi-shadow-inset: inset 0 0 0 1px rgba(9, 35, 52, 0.06);\n\n  /* ---- Motion (calm; brand is \"optimista, no forzada\") ------------- */\n  --qi-ease:        cubic-bezier(0.22, 0.61, 0.36, 1);\n  --qi-ease-out:    cubic-bezier(0.16, 1, 0.3, 1);\n  --qi-dur-fast:    140ms;\n  --qi-dur-med:     260ms;\n  --qi-dur-slow:    520ms;\n}\n\n/* ----------------------------------------------------- SEMANTIC ELEMENTS - */\nhtml, body { color: var(--qi-fg); background: var(--qi-surface); font-family: var(--qi-font-body); font-size: var(--qi-text-body); line-height: var(--qi-leading-normal); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n\nh1, .qi-h1 { font-family: var(--qi-font-display); font-weight: 500; font-size: var(--qi-text-h1); line-height: var(--qi-leading-tight); letter-spacing: var(--qi-tracking-tight); color: var(--qi-fg); margin: 0; }\nh2, .qi-h2 { font-family: var(--qi-font-display); font-weight: 500; font-size: var(--qi-text-h2); line-height: var(--qi-leading-snug);  letter-spacing: var(--qi-tracking-tight); color: var(--qi-fg); margin: 0; }\nh3, .qi-h3 { font-family: var(--qi-font-display); font-weight: 500; font-size: var(--qi-text-h3); line-height: var(--qi-leading-snug); color: var(--qi-fg); margin: 0; }\nh4, .qi-h4 { font-family: var(--qi-font-body);    font-weight: 600; font-size: var(--qi-text-h4); line-height: var(--qi-leading-snug); color: var(--qi-fg); margin: 0; }\n\n.qi-display { font-family: var(--qi-font-display); font-weight: 500; font-size: var(--qi-text-display); line-height: var(--qi-leading-tight); letter-spacing: var(--qi-tracking-tight); color: var(--qi-fg); }\n\np, .qi-body { font-family: var(--qi-font-body); font-weight: 400; font-size: var(--qi-text-body); line-height: var(--qi-leading-normal); color: var(--qi-fg); margin: 0; }\n.qi-body-lg { font-size: var(--qi-text-lg); line-height: var(--qi-leading-normal); }\n.qi-body-sm { font-size: var(--qi-text-sm); line-height: var(--qi-leading-normal); }\n.qi-caption { font-family: var(--qi-font-body); font-size: var(--qi-text-xs); line-height: var(--qi-leading-normal); color: var(--qi-fg-muted); }\n\n.qi-eyebrow { font-family: var(--qi-font-body); font-weight: 600; font-size: var(--qi-text-xs); letter-spacing: var(--qi-tracking-cap); text-transform: uppercase; color: var(--qi-fg-accent); }\n\n.qi-hashtag { font-family: var(--qi-font-body); font-weight: 600; color: var(--qi-azul-accion); }\n\ncode, pre, .qi-mono { font-family: var(--qi-font-mono); font-size: 0.9375em; }\n\na { color: var(--qi-fg-accent); text-decoration: none; transition: opacity var(--qi-dur-fast) var(--qi-ease); }\na:hover { opacity: 0.78; }\n\n/* Utility bg + fg helpers */\n.qi-on-dark { background: var(--qi-azul-score); color: var(--qi-white); }\n.qi-on-dark h1, .qi-on-dark h2, .qi-on-dark h3, .qi-on-dark h4, .qi-on-dark p { color: inherit; }\n<\u002Fstyle>\n  <style>\n    :root {\n      --ebg:#EEF2F7; --esurf:#FFFFFF; --etext:#0A1628; --etext2:#4A5568;\n      --etext3:#94A3B8; --eborder:#DDE3EB; --einput:#F4F7FB;\n      --eshadow:0 1px 3px rgba(10,22,40,.05),0 4px 14px rgba(10,22,40,.04);\n      --ebuscar-ib:#FEF2F2; --ebuscar-ic:#C41A1A;\n      --ereportar-ib:#E3F5F0; --ereportar-ic:#0A8A6A;\n      --eayuda-bg:#FEF2F2; --eayuda-bd:#FCA5A5; --eayuda-ib:#FEE2E2; - color:var(--etext2);line-height:1.5\">Ofrece tu tiempo en labores de rescate, apoyo logístico o asistencia médica.<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ goVoluntario }}\" style=\"background:#059669;color:white;border:none;border-radius:999px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s\" style-hover=\"opacity:0.88\">Registrarme<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"background:var(--esurf);border:1.5px solid var(--eborder);border-radius:20px;padding:28px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;box-shadow:var(--eshadow)\">\n              <div style=\"width:52px;height:52px;background:#FEF2F2;border-radius:14px;display:flex;align-items:center;justify-content:center\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C41A1A\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div><div style=\"font-size:17px;font-weight:700;color:var(--etext);margin-bottom:5px\">Donaciones<\u002Fdiv><div style=\"font-size:13px;color:var(--etext2);line-height:1.5\">Apoya económicamente a organizaciones verificadas que trabajan sobre el terreno.<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ goDonaciones }}\" style=\"background:#C41A1A;color:white;border:none;border-radius:999px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s\" style-hover=\"opacity:0.88\">Donar ahora<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"background:var(--esurf);border:1.5px solid var(--eborder);border-radius:20px;padding:28px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;box-shadow:var(--eshadow)\">\n              <div style=\"width:52px;height:52px;background:#EBF0FF;border-radius:14px;display:flex;align-items:center;justify-content:center\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1649CC\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"2\" y1=\"12\" x2=\"22\" y2=\"12\"><\u002Fline><path d=\"M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div><div style=\"font-size:17px;font-weight:700;color:var(--etext);margin-bottom:5px\">Internacional<\u002Fdiv><div style=\"font-size:13px;color:var(--etext2);line-height:1.5\">Estás fuera de Venezuela. Canales internacionales de donación y coordinación.<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ goInternacional }}\" style=\"background:#1649CC;color:white;border:none;border-radius:999px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s\" style-hover=\"opacity:0.88\">Cómo ayudar<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><!-- /puedo section -->\n\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ── REPORTAR ───────────────────────────── -->\n  <sc-if value=\"{{ isReportar }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:44px 24px 110px;animation:fadeUp .2s ease\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:14px;color:var(--etext3)\">\n        <button onclick=\"{{ goMain }}\" style=\"background:none;border:none;padding:0;cursor:pointer;color:var(--etext2);font-size:14px;display:flex;align-items:center;gap:5px\" style-hover=\"color:#C41A1A\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>Inicio\n        <\u002Fbutton>\n        <span>/<\u002Fspan><span style=\"color:var(--etext)\">Reportar persona<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"e-inner\">\n        <div style=\"text-align:center;margin-bottom:28px\">\n          <h2 style=\"font-family:'Stara',serif;font-size:clamp(22px,3vw,30px);font-weight:600;color:var(--etext);margin:0 0 8px;line-height:1.15\">Reportar persona desaparecida o encontrada<\u002Fh2>\n          <p style=\"font-size:15px;color:var(--etext2);margin:0;line-height:1.5\">Comparte los datos para que alguien pueda ayudar a ubicarla o reunirla con su familia.<\u002Fp>\n        <\u002Fdiv>\n        <form onsubmit=\"{{ submitReportar }}\" style=\"display:flex;flex-direction:column;gap:18px\">\n\n          <!-- Tipo -->\n          <div>\n            <div style=\"font-size:13px;font-weight:600;color:var(--etext);margin-bottom:10px\">¿Qué quieres reportar? <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n              <button type=\"button\" onclick=\"{{ setTypeDesaparecida }}\" style=\"background:{{ typeDesBg }};color:{{ typeDesText }};border:2px solid {{ typeDesBd }};border-radius:14px;padding:20px 14px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center\">\n                <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"><\u002Fline><\u002Fsvg>\n                <div><div style=\"font-size:15px;font-weight:700\">Persona desaparecida<\u002Fdiv><div style=\"font-size:12px;opacity:.75;margin-top:3px\">No sé dónde está<\u002Fdiv><\u002Fdiv>\n              <\u002Fbutton>\n              <button type=\"button\" onclick=\"{{ setTypeEncontrada }}\" style=\"background:{{ typeEncBg }};color:{{ typeEncText }};border:2px solid {{ typeEncBd }};border-radius:14px;padding:20px 14px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center\">\n                <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n                <div><div style=\"font-size:15px;font-weight:700\">Persona encontrada<\u002Fdiv><div style=\"font-size:12px;opacity:.75;margin-top:3px\">Sé dónde está o la vi<\u002Fdiv><\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Foto -->\n          <div>\n            <div style=\"font-size:14px;font-weight:600;color:var(--etext);margin-bottom:8px\">Foto de la persona<\u002Fdiv>\n            <div onclick=\"{{ triggerPhoto }}\" style=\"border:2px dashed var(--eborder);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s\" style-hover=\"border-color:#C41A1A\">\n              <div style=\"width:40px;height:40px;background:var(--ebuscar-ib);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ebuscar-ic)\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"16 16 12 12 8 16\"><\u002Fpolyline><line x1=\"12\" y1=\"12\" x2=\"12\" y2=\"21\"><\u002Fline><path d=\"M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:14px;font-weight:600;color:var(--etext)\">Cargar una foto<\u002Fdiv>\n                <div style=\"font-size:12px;color:var(--etext3);margin-top:2px\">JPG o PNG · opcional pero muy útil<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <input type=\"file\" id=\"modal-photo-rs\" accept=\"image/*\" style=\"display:none\">\n          <\u002Fdiv>\n\n          <!-- Nombre + Edad -->\n          <div class=\"e-form2\">\n            <div>\n              <label for=\"rsn\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Nombre y apellido <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Flabel>\n              <input id=\"rsn\" type=\"text\" placeholder=\"Ej. María Fernanda Rangel\" required=\"\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 15px;font-size:16px;color:var(--etext)\">\n            <\u002Fdiv>\n            <div>\n              <label for=\"rsa\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Edad<\u002Flabel>\n              <input id=\"rsa\" type=\"number\" placeholder=\"Años\" min=\"0\" max=\"120\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 15px;font-size:16px;color:var(--etext)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Ubicación: desaparecida -->\n          <sc-if value=\"{{ isDesaparecida }}\" hint-placeholder-val=\"{{ true }}\">\n            <div class=\"e-form2\">\n              <div>\n                <label for=\"rsl\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Última ubicación vista <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Flabel>\n                <input id=\"rsl\" type=\"text\" placeholder=\"Ej. Catia La Mar, La Guaira\" required=\"\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 15px;font-size:16px;color:var(--etext)\">\n              <\u002Fdiv>\n              <div>\n                <label for=\"rsf\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Desde cuándo sin contacto<\u002Flabel>\n                <input id=\"rsf\" type=\"datetime-local\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 14px;font-size:15px;color:var(--etext)\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Ubicación: encontrada -->\n          <sc-if value=\"{{ isEncontrada }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"font-size:13px;font-weight:600;color:var(--etext);margin-bottom:10px\">¿Dónde fue encontrada? <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:10px;margin-bottom:12px\">\n                <button type=\"button\" onclick=\"{{ setFoundHospital }}\" style=\"flex:1;background:{{ foundHospBg }};color:{{ foundHospText }};border:1.5px solid {{ foundHospBd }};border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><line x1=\"9\" y1=\"3\" x2=\"9\" y2=\"21\"><\u002Fline><line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"><\u002Fline><\u002Fsvg>\n                  En un hospital\n                <\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ setFoundCalle }}\" style=\"flex:1;background:{{ foundCalleBg }};color:{{ foundCalleText }};border:1.5px solid {{ foundCalleBd }};border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\"><\u002Fpath><polyline points=\"9 22 9 12 15 12 15 22\"><\u002Fpolyline><\u002Fsvg>\n                  En la calle\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ foundIsHospital }}\" hint-placeholder-val=\"{{ false }}\">\n                <select onchange=\"{{ setSelectedHospital }}\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 14px;font-size:15px;color:var(--etext);cursor:pointer\">\n                  <option value=\"\">Seleccionar hospital...<\u002Foption>\n                  <option value=\"Hospital Vargas\">Hospital Universitario de Caracas (Vargas)<\u002Foption>\n                  <option value=\"Hospital Razetti La Guaira\">Hospital Razetti — La Guaira<\u002Foption>\n                  <option value=\"Hospital Domingo Luciani\">Hospital Domingo Luciani — El Llanito<\u002Foption>\n                  <option value=\"Centro Médico La Trinidad\">Centro Médico Docente La Trinidad<\u002Foption>\n                  <option value=\"Clínica El Ávila\">Clínica El Ávila — Altamira<\u002Foption>\n                <\u002Fselect>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ foundIsCalle }}\" hint-placeholder-val=\"{{ false }}\">\n                <input type=\"text\" placeholder=\"Ej. Av. Principal de Catia, frente a la plaza...\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 14px;font-size:15px;color:var(--etext)\">\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div>\n              <label for=\"rsf2\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Cuándo fue encontrada<\u002Flabel>\n              <input id=\"rsf2\" type=\"datetime-local\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 14px;font-size:15px;color:var(--etext)\">\n            <\u002Fdiv>\n            <!-- Estado de la persona encontrada -->\n            <div>\n              <div style=\"font-size:13px;font-weight:600;color:var(--etext);margin-bottom:8px\">¿Cuál es su estado actual? <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:10px\">\n                <button type=\"button\" onclick=\"{{ setEncAsalvo }}\" style=\"flex:1;background:{{ encAsalvoBg }};color:{{ encAsalvoText }};border:1.5px solid {{ encAsalvoBd }};border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <span style=\"width:9px;height:9px;background:#4ADE80;border-radius:50%;display:inline-block;flex-shrink:0\"><\u002Fspan>\n                  A salvo\n                <\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ setEncFallecida }}\" style=\"flex:1;background:{{ encFallBg }};color:{{ encFallText }};border:1.5px solid {{ encFallBd }};border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <span style=\"width:9px;height:9px;background:#FCA5A5;border-radius:50%;display:inline-block;flex-shrink:0\"><\u002Fspan>\n                  Fallecida\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Descripción -->\n          <div>\n            <label for=\"rsd\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Descripción y señas particulares<\u002Flabel>\n            <textarea id=\"rsd\" placeholder=\"Estatura, contextura, ropa que vestía, cicatrices, lentes, condición médica...\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 15px;font-size:16px;color:var(--etext);min-height:88px;resize:vertical\" rows=\"3\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <!-- Contacto -->\n          <div style=\"background:var(--einput);border-radius:12px;padding:16px\">\n            <label for=\"rsc\" style=\"font-size:13px;font-weight:700;color:var(--etext);display:block;margin-bottom:8px\">¿Cómo te contactan si alguien la reconoce?<\u002Flabel>\n            <input id=\"rsc\" type=\"text\" placeholder=\"Tu nombre y un teléfono o correo\" style=\"width:100%;background:var(--esurf);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 14px;font-size:15px;color:var(--etext)\">\n          <\u002Fdiv>\n\n          <!-- Aviso -->\n          <div style=\"background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:12px;padding:16px\">\n            <div style=\"display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:#92400E;margin-bottom:10px\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" style=\"flex-shrink:0\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>\n              Antes de publicar\n            <\u002Fdiv>\n            <ul style=\"margin:0 0 12px;padding-left:16px;font-size:13px;color:#78350F;line-height:1.7\">\n              <li>Estos datos serán públicos: visibles para cualquier persona.<\u002Fli>\n              <li>No publiques datos sensibles (cédula, dirección exacta).<\u002Fli>\n              <li>Si la persona aparece, avísanos para retirar el reporte.<\u002Fli>\n            <\u002Ful>\n            <label style=\"display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;color:#78350F;line-height:1.5\">\n              <input type=\"checkbox\" onchange=\"{{ toggleConfirmed }}\" style=\"margin-top:2px;flex-shrink:0;width:15px;height:15px;cursor:pointer\">\n              Confirmo que un familiar o allegado autoriza publicar estos datos para ayudar a localizar a la persona.\n            <\u002Flabel>\n          <\u002Fdiv>\n\n          <!-- Botones -->\n          <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:4px\">\n            <button type=\"submit\" style=\"flex:1;min-width:200px;background:{{ publishBg }};color:white;border:none;border-radius:999px;padding:16px 24px;font-size:16px;font-weight:700;cursor:{{ publishCursor }};transition:opacity .15s\" style-hover=\"opacity:0.88\">Publicar reporte<\u002Fbutton>\n            <button type=\"button\" onclick=\"{{ goMain }}\" style=\"background:var(--esurf);color:var(--etext2);border:1.5px solid var(--eborder);border-radius:999px;padding:16px 24px;font-size:16px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--einput)\">Cancelar<\u002Fbutton>\n          <\u002Fdiv>\n\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ── NECESITO AYUDA ─────────────────────── -->\n  <sc-if value=\"{{ isAyuda }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:820px;margin:0 auto;padding:52px 24px 110px;animation:fadeUp .2s ease\">\n\n      <!-- Back -->\n      <div style=\"margin-bottom:20px\">\n        <button onclick=\"{{ goMain }}\" style=\"background:none;border:none;padding:0;cursor:pointer;color:var(--etext2);font-size:14px;display:flex;align-items:center;gap:5px\" style-hover=\"color:#B91C1C\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>Inicio\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Heading -->\n      <h1 style=\"font-family:'Stara',serif;font-size:clamp(28px,4vw,44px);font-weight:600;color:var(--etext);text-align:center;margin:0 0 32px;line-height:1.1\">¿Necesitas ayuda?<\u002Fh1>\n\n      <!-- ── 1. CUESTIONARIO ── -->\n      <div style=\"background:var(--esurf);border:1.5px solid var(--eborder);border-radius:20px;padding:24px 28px;margin-bottom:20px;box-shadow:var(--eshadow)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:20px\">\n          <div style=\"width:36px;height:36px;background:#FEE2E2;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B91C1C\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <h2 style=\"font-family:'Stara',serif;font-size:20px;font-weight:600;color:var(--etext);margin:0\">Solicitar ayuda de emergencia<\u002Fh2>\n            <p style=\"font-size:13px;color:var(--etext2);margin:0\">Tu solicitud llega directo a brigadas activas. En peligro inmediato, llama al 911 o 171.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-bottom:20px\">\n          <div style=\"font-size:13px;font-weight:600;color:var(--etext);margin-bottom:10px\">¿Qué tipo de ayuda necesitas?<\u002Fdiv>\n          <div class=\"e-htypes\">\n            <button type=\"button\" onclick=\"{{ setAtrapado }}\" style=\"background:{{ htABg }};color:{{ htAText }};border:1.5px solid {{ htABd }};border-radius:10px;padding:12px 8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"> -bottom:8px;display:flex;align-items:center;gap:6px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#92400E\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><\u002Fsvg>Viene una réplica<\u002Fdiv>\n                <ul style=\"margin:0;padding-left:16px;font-size:12px;color:var(--etext2);line-height:1.9\"><li>Ponte bajo una mesa resistente<\u002Fli><li>Aléjate de ventanas y estantes<\u002Fli><li>Espera en área abierta tras el movimiento<\u002Fli><\u002Ful>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- Apoyo -->\n        <div style=\"background:var(--esurf);border:1.5px solid var(--eborder);border-radius:18px;overflow:hidden;box-shadow:var(--eshadow)\">\n          <button onclick=\"{{ toggleApoyo }}\" style=\"width:100%;background:none;border:none;padding:20px 22px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left\" style-hover=\"background:var(--einput)\">\n            <div style=\"width:44px;height:44px;background:#EBF0FF;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1649CC\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex:1\">\n              <div style=\"font-size:16px;font-weight:700;color:var(--etext)\">Apoyo<\u002Fdiv>\n              <div style=\"font-size:12px;color:var(--etext2);margin-top:2px\">Psicológico y Protección Civil<\u002Fdiv>\n            <\u002Fdiv>\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 -shadow:0 1px 3px rgba(0,0,0,.04)\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px\">\n              <div style=\"font-size:15px;font-weight:700;color:#111827\">Puntos de acopio en {{ intCountry }}<\u002Fdiv>\n              <span style=\"font-size:12px;color:#C41A1A;font-weight:600\">Para donar insumos físicos<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ intAcopio }}\" as=\"pt\" hint-placeholder-count=\"2\">\n                <div style=\"border:1px solid #F3F4F6;border-radius:10px;padding:14px 16px\">\n                  <div style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;color:#C41A1A;margin-bottom:4px;text-transform:uppercase\">{{ pt.ciudad }}<\u002Fdiv>\n                  <div style=\"font-size:14px;font-weight:700;color:#111827;margin-bottom:6px\">{{ pt.org }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:flex-start;gap:5px;font-size:12px;color:#6B7280;margin-bottom:3px\"><span style=\"flex-shrink:0\">📍<\u002Fspan>{{ pt.dir }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:5px;font-size:12px;color:#6B7280;margin-bottom:6px\"><span>🕐<\u002Fspan>{{ pt.hora }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#374151;margin-bottom:8px;line-height:1.4\">{{ pt.desc }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9CA3AF\">{{ pt.fuente }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Canales para difundir -->\n        <div style=\"background:white;border:1px solid #E5E7EB;border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n          <div style=\"font-size:15px;font-weight:700;color:#111827;margin-bottom:4px\">Fundaciones y canales para difundir<\u002Fdiv>\n          <p style=\"font-size:12px;color:#9CA3AF;margin:0 0 14px;line-height:1.4\">Prioriza fuentes verificadas; confirma antes de mover donaciones.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ intCanales }}\" as=\"canal\" hint-placeholder-count=\"1\">\n              <div style=\"border:1px solid #F3F4F6;border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n                <div style=\"flex:1\">\n                  <div style=\"font-size:14px;font-weight:700;color:#111827;margin-bottom:4px\">{{ canal.org }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#6B7280;line-height:1.4;margin-bottom:6px\">{{ canal.desc }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9CA3AF\">{{ canal.fuente }}<\u002Fdiv>\n                <\u002Fdiv>\n                <a href=\"{{ canal.url }}\" target=\"_blank\" rel=\"noopener\" style=\"background:#111827;color:white;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:5px;white-space:nowrap\" style-hover=\"opacity:0.85\">Abrir canal <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6\"><\u002Fpath><polyline points=\"15 3 21 3 21 9\"><\u002Fpolyline><line x1=\"10\" y1=\"14\" x2=\"21\" y2=\"3\"><\u002Fline><\u002Fsvg><\u002Fa>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ── VOLUNTARIO ── -->\n  <sc-if value=\"{{ isVoluntario }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:960px;margin:0 auto;padding:44px 24px 110px;animation:fadeUp .2s ease\">\n      <button onclick=\"{{ goMain }}\" style=\"background:none;border:none;padding:0;cursor:pointer;color:var(--etext2);font-size:14px;display:flex;align-items:center;gap:5px;margin-bottom:24px\" style-hover=\"color:#C41A1A\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>Inicio<\u002Fbutton>\n\n      <div style=\"display:grid;grid-template-columns:1fr;gap:24px\">\n\n        <!-- Form voluntario -->\n        <div style=\"background:var(--esurf);border:1.5px solid var(--eborder);border-radius:20px;padding:26px 28px;box-shadow:var(--eshadow)\">\n          <h2 style=\"font-family:'Stara',serif;font-size:20px;font-weight:600;color:var(--etext);margin:0 0 6px\">Registrarme como voluntario<\u002Fh2>\n          <p style=\"font-size:13px;color:var(--etext2);margin:0 0 20px\">El equipo de coordinación se pondrá en contacto contigo en las próximas horas.<\u002Fp>\n          <form onsubmit=\"{{ submitPuedoAyudar }}\" style=\"display:flex;flex-direction:column;gap:14px\">\n            <div class=\"e-form2\">\n              <div>\n                <label style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Tu nombre<\u002Flabel>\n                <input type=\"text\" placeholder=\"Nombre completo\" required=\"\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Teléfono de contacto<\u002Flabel>\n                <input type=\"tel\" placeholder=\"0414-XXX-XXXX\" required=\"\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">¿Qué puedes ofrecer?<\u002Flabel>\n              <textarea placeholder=\"Ej. Tengo camioneta disponible, soy médico, puedo llevar víveres, manejo de grúas...\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext);min-height:80px;resize:vertical\" rows=\"3\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Zona desde donde puedes ayudar<\u002Flabel>\n              <input type=\"text\" placeholder=\"Ej. Chacao, Caracas\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"background:#059669;color:white;border:none;border-radius:999px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s\" style-hover=\"opacity:0.88\">Enviar registro<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fdiv>\n\n        <!-- Chat espacio voluntarios -->\n        <div style=\"background:var(--esurf);border:1.5px solid var(--eborder);border-radius:20px;overflow:hidden;box-shadow:var(--eshadow)\">\n          <!-- Header -->\n          <div style=\"padding:18px 22px 14px;border-bottom:1px solid var(--eborder)\">\n            <div style=\"font-size:18px;font-weight:700;color:var(--etext);margin-bottom:4px\">🤝 Espacio de voluntarios<\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--etext2);line-height:1.5\">Espacio de intercambio de información entre voluntarios. Coordínense, compartan información verificada y ofrezcan o pidan apoyo. Sean respetuosos: no compartan datos sensibles ni difundan rumores sin confirmar.<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Role filter tabs -->\n          <div style=\"padding:12px 22px 10px;border-bottom:1px solid var(--eborder);display:flex;gap:7px;flex-wrap:wrap\">\n            <sc-for list=\"{{ chatRoles }}\" as=\"role\" hint-placeholder-count=\"7\">\n              <button onclick=\"{{ role.onClick }}\" style=\"background:{{ role.bg }};color:{{ role.text }};border:1.5px solid {{ role.bd }};border-radius:999px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap\">{{ role.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- Participas como -->\n          <div style=\"padding:10px 22px;border-bottom:1px solid var(--eborder);display:flex;align-items:center;gap:8px;font-size:13px;color:var(--etext2)\">\n            <span>Participas como:<\u002Fspan>\n            <select onchange=\"{{ setChatRole }}\" style=\"background:none;border:none;font-size:13px;font-weight:700;color:var(--etext);cursor:pointer;padding:2px 4px\">\n              <option value=\"Rescatista\">🦺 Rescatista<\u002Foption>\n              <option value=\"Médico\">🩺 Médico<\u002Foption>\n              <option value=\"Voluntario\">💛 Voluntario<\u002Foption>\n              <option value=\"Coordinador\">🎯 Coordinador<\u002Foption>\n              <option value=\"ONG / Org.\">🏛️ ONG / Org.<\u002Foption>\n              <option value=\"Ciudadano\" selected=\"\">🏠 Ciudadano<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <!-- Messages -->\n          <div style=\"padding:16px 22px;display:flex;flex-direction:column;gap:14px;min-height:240px;max-height:360px;overflow-y:auto\">\n            <sc-for list=\"{{ chatMessages }}\" as=\"msg\" hint-placeholder-count=\"3\">\n              <div style=\"background:var(--einput);border-radius:12px;padding:14px 16px\">\n                <sc-if value=\"{{ msg.hasReply }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border-left:3px solid var(--eborder);padding-left:10px;margin-bottom:8px;font-size:12px;color:var(--etext3)\">{{ msg.replyText }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap\">\n                  <span style=\"background:{{ msg.roleBg }};color:{{ msg.roleColor }};font-size:11px;font-weight:800;padding:2px 10px;border-radius:999px\">{{ msg.role }}<\u002Fspan>\n                  <span style=\"font-size:13px;font-weight:700;color:var(--etext)\">{{ msg.name }}<\u002Fspan>\n                  <span style=\"font-size:11px;color:var(--etext3);margin-left:auto\">{{ msg.time }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:14px;color:var(--etext);line-height:1.5;margin-bottom:8px\">{{ msg.text }}<\u002Fdiv>\n                <button onclick=\"{{ msg.onReply }}\" style=\"background:none;border:none;padding:0;font-size:11px;color:var(--etext3);cursor:pointer\" style-hover=\"color:var(--etext2)\">↩ Responder<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- Reply preview -->\n          <sc-if value=\"{{ chatReplyTo }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin:0 22px;padding:8px 12px;background:var(--einput);border-radius:8px;border-left:3px solid #C41A1A;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;color:var(--etext2)\">\n              <span>Respondiendo a <strong style=\"color:var(--etext)\">{{ chatReplyTo.name }}<\u002Fstrong>: {{ chatReplyTo.text }}<\u002Fspan>\n              <button onclick=\"{{ clearReply }}\" style=\"background:none;border:none;cursor:pointer;color:var(--etext3);font-size:16px;padding:0;line-height:1\" style-hover=\"color:var(--etext)\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <!-- Input -->\n          <form onsubmit=\"{{ sendChat }}\" style=\"padding:14px 22px;border-top:1px solid var(--eborder);display:flex;flex-direction:column;gap:8px\">\n            <input type=\"text\" placeholder=\"Tu nombre (opcional)\" value=\"{{ chatName }}\" oninput=\"{{ setChatName }}\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:9px;padding:10px 13px;font-size:14px;color:var(--etext)\">\n            <div style=\"display:flex;gap:8px\">\n              <input type=\"text\" placeholder=\"Escribe un mensaje...\" value=\"{{ chatMsg }}\" oninput=\"{{ setChatMsg }}\" required=\"\" style=\"flex:1;background:var(--einput);border:1.5px solid var(--eborder);border-radius:9px;padding:10px 13px;font-size:14px;color:var(--etext)\">\n              <button type=\"submit\" style=\"background:var(--etext);color:var(--esurf);border:none;border-radius:9px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s\" style-hover=\"opacity:0.85\">Enviar<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fform>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ── CONFIRMACIÓN ───────────────────────── -->\n  <sc-if value=\"{{ isConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:560px;margin:0 auto;padding:80px 24px 110px;text-align:center;animation:fadeUp .25s ease\">\n      <div style=\"width:76px;height:76px;border-radius:50%;background:{{ confirmColor }};display:flex;align-items:center;justify-content:center;margin:0 auto 28px;animation:cpop .4s cubic-bezier(.22,.61,.36,1) both\">\n        <svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2.8\" stroke-linecap=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Stara',serif;font-size:30px;font-weight:600;color:var(--etext);margin:0 0 14px\">{{ confirmTitle }}<\u002Fh2>\n      <p style=\"font-size:16px;color:var(--etext2);line-height:1.65;max-width:400px;margin:0 auto 36px\">{{ confirmDesc }}<\u002Fp>\n      <sc-if value=\"{{ showAyudaCallout }}\" hint-placeholder-val=\"{{ false }}\">\n        <a href=\"tel:911\" style=\"display:block;max-width:340px;margin:0 auto 12px;background:#B91C1C;color:white;border-radius:999px;padding:16px;font-size:16px;font-weight:700;text-decoration:none;transition:opacity .15s\" style-hover=\"opacity:0.88\">Llamar al 911<\u002Fa>\n      <\u002Fsc-if>\n      <button onclick=\"{{ goMain }}\" style=\"display:block;max-width:340px;margin:0 auto;width:100%;background:var(--esurf);color:var(--etext);border:1.5px solid var(--eborder);border-radius:999px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s\" style-hover=\"background:var(--einput)\">Volver al inicio<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ── FOOTER FIJO ────────────────────────── -->\n  <!-- ── MAPA + REPORTES ── (only on main) -->\n  <sc-if value=\"{{ isMain }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"background:var(--ebg);border-top:1px solid var(--eborder)\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:48px 24px 0\">\n        <h2 style=\"font-family:'Stara',serif;font-size:clamp(22px,3vw,30px);font-weight:600;color:var(--etext);margin:0 0 6px\">Mapa de reportes en tiempo real<\u002Fh2>\n        <p style=\"font-size:14px;color:var(--etext2);margin:0 0 22px\">Toca un punto del mapa para reportar o ver el estado de una zona.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 320px;gap:0;border:1.5px solid var(--eborder);border-radius:16px;overflow:hidden;box-shadow:var(--eshadow);margin-bottom:4px\">\n          <div id=\"e-leaflet-map\" style=\"height:420px;min-height:320px\"><\u002Fdiv>\n          <div style=\"background:var(--esurf);border-left:1px solid var(--eborder);display:flex;flex-direction:column;overflow:hidden\">\n            <!-- Stats header -->\n            <div style=\"padding:14px 16px;border-bottom:1px solid va width:100%;margin:auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)\">\n        <!-- Header -->\n        <div style=\"background:#475569;padding:22px 24px 18px;position:relative\">\n          <button onclick=\"{{ closeGuide }}\" style=\"position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white\" style-hover=\"background:rgba(255,255,255,.25)\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n          <\u002Fbutton>\n          <div style=\"font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px\">{{ guideModalCat }}<\u002Fdiv>\n          <h2 style=\"font-family:'Stara',serif;font-size:clamp(18px,3vw,22px);font-weight:700;color:white;margin:0;line-height:1.2;padding-right:36px\">{{ guideModalTitle }}<\u002Fh2>\n        <\u002Fdiv>\n        <!-- Tip -->\n        <div style=\"padding:16px 24px;background:{{ guideModalTipBg }};border-bottom:1px solid #E5E7EB\">\n          <div style=\"font-size:14px;font-weight:600;color:{{ guideModalTipColor }};line-height:1.5\">{{ guideModalTip }}<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Steps -->\n        <div style=\"padding:20px 24px 24px\">\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#9CA3AF;margin-bottom:14px\">Pasos a seguir<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ guideModalSteps }}\" as=\"step\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px\">\n                <div style=\"width:26px;height:26px;background:#475569;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:800;color:white;line-height:1\">{{ step.n }}<\u002Fdiv>\n                <div style=\"font-size:14px;color:#374151;line-height:1.6;padding-top:3px\">{{ step.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- Emergency CTA -->\n          <div style=\"margin-top:22px;padding-top:18px;border-top:1px solid #E5E7EB;display:flex;gap:10px;flex-wrap:wrap\">\n            <a href=\"tel:911\" style=\"flex:1;background:#C41A1A;color:white;border-radius:999px;padding:12px 20px;font-size:15px;font-weight:800;text-decoration:none;text-align:center;min-width:120px\" style-hover=\"opacity:0.88\">Llamar 911<\u002Fa>\n            <button onclick=\"{{ closeGuide }}\" style=\"flex:1;background:#F3F4F6;color:#374151;border:none;border-radius:999px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;min-width:100px\" style-hover=\"background:#E5E7EB\">Cerrar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ── MODAL: REPORTAR PERSONA ── -->\n  <sc-if value=\"{{ showReportModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeReportModal }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;overflow-y:auto;padding:24px 16px;display:flex;align-items:flex-start;justify-content:center\">\n      <div onclick=\"{{ stopProp }}\" style=\"background:var(--esurf);border-radius:16px;max-width:580px;width:100%;padding:28px 32px 32px;position:relative;margin:auto\">\n        <button onclick=\"{{ closeReportModal }}\" style=\"position:absolute;top:20px;right:20px;background:var(--einput);border:1.5px solid var(--eborder);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--etext2)\" style-hover=\"background:var(--eborder)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n        <\u002Fbutton>\n        <h2 style=\"font-family:'Stara',serif;font-size:24px;font-weight:600;color:var(--etext);margin:0 0 6px;padding-right:40px\">Reportar persona desaparecida o encontrada<\u002Fh2>\n        <p style=\"font-size:14px;color:var(--etext2);margin:0 0 20px;line-height:1.5\">Comparte los datos para que alguien pueda ayudar a ubicarla o reunirla con su familia.<\u002Fp>\n        <div style=\"height:1px;background:var(--eborder);margin-bottom:22px\"><\u002Fdiv>\n        <form onsubmit=\"{{ submitReport }}\" style=\"display:flex;flex-direction:column;gap:18px\">\n\n          <div>\n            <div style=\"font-size:13px;font-weight:600;color:var(--etext);margin-bottom:10px\">¿Qué quieres reportar? <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n              <button type=\"button\" onclick=\"{{ setTypeDesaparecida }}\" style=\"background:{{ typeDesBg }};color:{{ typeDesText }};border:2px solid {{ typeDesBd }};border-radius:14px;padding:20px 14px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center\">\n                <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"><\u002Fline><\u002Fsvg>\n                <div>\n                  <div style=\"font-size:15px;font-weight:700\">Persona desaparecida<\u002Fdiv>\n                  <div style=\"font-size:12px;opacity:.75;margin-top:3px\">No sé dónde está<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fbutton>\n              <button type=\"button\" onclick=\"{{ setTypeEncontrada }}\" style=\"background:{{ typeEncBg }};color:{{ typeEncText }};border:2px solid {{ typeEncBd }};border-radius:14px;padding:20px 14px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center\">\n                <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n                <div>\n                  <div style=\"font-size:15px;font-weight:700\">Persona encontrada<\u002Fdiv>\n                  <div style=\"font-size:12px;opacity:.75;margin-top:3px\">Sé dónde está o la vi<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:14px;font-weight:600;color:var(--etext);margin-bottom:8px\">Foto de la persona<\u002Fdiv>\n            <div onclick=\"{{ triggerPhoto }}\" style=\"border:2px dashed var(--eborder);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s\" style-hover=\"border-color:#C41A1A\">\n              <div style=\"width:40px;height:40px;background:var(--ebuscar-ib);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ebuscar-ic)\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"16 16 12 12 8 16\"><\u002Fpolyline><line x1=\"12\" y1=\"12\" x2=\"12\" y2=\"21\"><\u002Fline><path d=\"M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:14px;font-weight:600;color:var(--etext)\">Cargar una foto<\u002Fdiv>\n                <div style=\"font-size:12px;color:var(--etext3);margin-top:2px\">JPG o PNG · opcional pero muy útil<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <input type=\"file\" id=\"modal-photo\" accept=\"image/*\" style=\"display:none\">\n          <\u002Fdiv>\n\n          <div class=\"e-form2\">\n            <div>\n              <label for=\"mn\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Nombre y apellido <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Flabel>\n              <input id=\"mn\" type=\"text\" placeholder=\"Ej. María Fernanda Rangel\" required=\"\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n            <\u002Fdiv>\n            <div>\n              <label for=\"ma\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Edad<\u002Flabel>\n              <input id=\"ma\" type=\"number\" placeholder=\"Años\" min=\"0\" max=\"120\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Ubicación si desaparecida -->\n          <sc-if value=\"{{ isDesaparecida }}\" hint-placeholder-val=\"{{ true }}\">\n            <div class=\"e-form2\">\n              <div>\n                <label for=\"ml\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Última ubicación vista <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Flabel>\n                <input id=\"ml\" type=\"text\" placeholder=\"Ej. Catia La Mar, La Guaira\" required=\"\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n              <\u002Fdiv>\n              <div>\n                <label for=\"mf\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Desde cuándo sin contacto<\u002Flabel>\n                <input id=\"mf\" type=\"datetime-local\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Ubicación si encontrada -->\n          <sc-if value=\"{{ isEncontrada }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"font-size:13px;font-weight:600;color:var(--etext);margin-bottom:10px\">¿Dónde fue encontrada? <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:10px;margin-bottom:12px\">\n                <button type=\"button\" onclick=\"{{ setFoundHospital }}\" style=\"flex:1;background:{{ foundHospBg }};color:{{ foundHospText }};border:1.5px solid {{ foundHospBd }};border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><line x1=\"9\" y1=\"3\" x2=\"9\" y2=\"21\"><\u002Fline><line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"><\u002Fline><\u002Fsvg>\n                  En un hospital\n                <\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ setFoundCalle }}\" style=\"flex:1;background:{{ foundCalleBg }};color:{{ foundCalleText }};border:1.5px solid {{ foundCalleBd }};border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\"><\u002Fpath><polyline points=\"9 22 9 12 15 12 15 22\"><\u002Fpolyline><\u002Fsvg>\n                  En la calle\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ foundIsHospital }}\" hint-placeholder-val=\"{{ false }}\">\n                <select onchange=\"{{ setSelectedHospital }}\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext);cursor:pointer\">\n                  <option value=\"\">Seleccionar hospital...<\u002Foption>\n                  <option value=\"Hospital Vargas\">Hospital Universitario de Caracas (Vargas)<\u002Foption>\n                  <option value=\"Hospital Razetti La Guaira\">Hospital Razetti — La Guaira<\u002Foption>\n                  <option value=\"Hospital Domingo Luciani\">Hospital Domingo Luciani — El Llanito<\u002Foption>\n                  <option value=\"Centro Médico La Trinidad\">Centro Médico Docente La Trinidad<\u002Foption>\n                  <option value=\"Clínica El Ávila\">Clínica El Ávila — Altamira<\u002Foption>\n                <\u002Fselect>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ foundIsCalle }}\" hint-placeholder-val=\"{{ false }}\">\n                <input type=\"text\" placeholder=\"Ej. Av. Principal de Catia, frente a la plaza...\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div>\n              <label for=\"mf2\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Cuándo fue encontrada<\u002Flabel>\n              <input id=\"mf2\" type=\"datetime-local\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n            <\u002Fdiv>\n            <!-- Estado persona encontrada -->\n            <div>\n              <div style=\"font-size:13px;font-weight:600;color:var(--etext);margin-bottom:8px\">¿Cuál es su estado actual? <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:10px\">\n                <button type=\"button\" onclick=\"{{ setEncAsalvo }}\" style=\"flex:1;background:{{ encAsalvoBg }};color:{{ encAsalvoText }};border:1.5px solid {{ encAsalvoBd }};border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <span style=\"width:9px;height:9px;background:#4ADE80;border-radius:50%;display:inline-block;flex-shrink:0\"><\u002Fspan>A salvo\n                <\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ setEncFallecida }}\" style=\"flex:1;background:{{ encFallBg }};color:{{ encFallText }};border:1.5px solid {{ encFallBd }};border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px\">\n                  <span style=\"width:9px;height:9px;background:#FCA5A5;border-radius:50%;display:inline-block;flex-shrink:0\"><\u002Fspan>Fallecida\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div>\n            <label for=\"md\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:6px\">Descripción y señas particulares<\u002Flabel>\n            <textarea id=\"md\" placeholder=\"Estatura, contextura, ropa que vestía, cicatrices, lentes, condición médica...\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext);min-height:86px;resize:vertical\" rows=\"3\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <div style=\"background:var(--einput);border-radius:12px;padding:16px\">\n            <label for=\"mc\" style=\"font-size:13px;font-weight:700;color:var(--etext);display:block;margin-bottom:8px\">¿Cómo te contactan si alguien la reconoce?<\u002Flabel>\n            <input id=\"mc\" type=\"text\" placeholder=\"Tu nombre y un teléfono o correo\" style=\"width:100%;background:var(--esurf);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--etext)\">\n          <\u002Fdiv>\n\n          <div style=\"background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:12px;padding:16px\">\n            <div style=\"display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:#92400E;margin-bottom:10px\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" style=\"flex-shrink:0\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>\n              Antes de publicar\n            <\u002Fdiv>\n            <ul style=\"margin:0 0 12px;padding-left:16px;font-size:13px;color:#78350F;line-height:1.7\">\n              <li>Estos datos serán públicos: visibles para cualquier persona.<\u002Fli>\n              <li>No publiques datos sensibles (cédula, dirección exacta).<\u002Fli>\n              <li>Si la persona aparece, avísanos para retirar el reporte.<\u002Fli>\n            <\u002Ful>\n            <label style=\"display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;color:#78350F;line-height:1.5\">\n              <input type=\"checkbox\" onchange=\"{{ toggleConfirmed }}\" style=\"margin-top:2px;flex-shrink:0;width:15px;height:15px;cursor:pointer\">\n              Confirmo que un familiar o allegado autoriza publicar estos datos para ayudar a localizar a la persona.\n            <\u002Flabel>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;justify-content:flex-end;gap:12px;padding-top:4px\">\n            <button type=\"button\" onclick=\"{{ closeReportModal }}\" style=\"background:var(--esurf);color:var(--etext);border:1.5px solid var(--eborder);border-radius:10px;padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--einput)\">Cancelar<\u002Fbutton>\n            <button type=\"submit\" style=\"background:{{ publishBg }};color:white;border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:700;cursor:{{ publishCursor }};display:flex;align-items:center;gap:8px;transition:opacity .15s\">\n              Publicar reporte\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ── MODAL: DETALLE DE PERSONA ── -->\n  <sc-if value=\"{{ showPersonDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closePersonDetail }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;overflow-y:auto;padding:24px 16px;display:flex;align-items:flex-start;justify-content:center\">\n      <div onclick=\"{{ stopProp }}\" style=\"background:var(--esurf);border-radius:20px;max-width:540px;width:100%;margin:auto;overflow:hidden\">\n        <div style=\"height:180px;background:var(--einput);position:relative;display:flex;align-items:center;justify-conten round:#FCA5A5;border-radius:50%;display:inline-block;flex-shrink:0\"><\u002Fspan>\n                Fallecido/a\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Dónde fue encontrada -->\n          <div>\n            <label style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:8px\">¿Dónde fue encontrada?<\u002Flabel>\n            <div style=\"display:flex;gap:10px;margin-bottom:10px\">\n              <button type=\"button\" onclick=\"{{ setLocHospital }}\" style=\"flex:1;background:{{ locHospBg }};color:{{ locHospText }};border:1.5px solid {{ locHospBd }};border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><line x1=\"9\" y1=\"3\" x2=\"9\" y2=\"21\"><\u002Fline><line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"><\u002Fline><\u002Fsvg>\n                En un hospital\n              <\u002Fbutton>\n              <button type=\"button\" onclick=\"{{ setLocCalle }}\" style=\"flex:1;background:{{ locCalleBg }};color:{{ locCalleText }};border:1.5px solid {{ locCalleBd }};border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\"><\u002Fpath><\u002Fsvg>\n                En la calle\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ locShowHospital }}\" hint-placeholder-val=\"{{ false }}\">\n              <select onchange=\"{{ setLocalizadaHospital }}\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--etext);cursor:pointer\">\n                <option value=\"\">Seleccionar hospital...<\u002Foption>\n                <option value=\"Hospital Perez Carreño\">Hospital Perez Carreño — Caracas<\u002Foption>\n                <option value=\"H. Periférico de Catia\">H. Periférico de Catia — Caracas<\u002Foption>\n                <option value=\"Hospital T Ipo Iv El Llanito\">Hospital T Ipo Iv El Llanito — Miranda<\u002Foption>\n                <option value=\"Hospital Antimano\">Hospital Antimano — Caracas<\u002Foption>\n                <option value=\"Hospital Av. Anauco\">Hospital Av. Anauco — Caracas<\u002Foption>\n                <option value=\"Hospital Av. San Martín\">Hospital Av. San Martín — Caracas<\u002Foption>\n                <option value=\"Hospital Vargas (Razetti)\">Hospital Vargas (Razetti) — La Guaira<\u002Foption>\n              <\u002Fselect>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ locShowCalle }}\" hint-placeholder-val=\"{{ false }}\">\n              <input type=\"text\" placeholder=\"Ej. Av. Principal de Catia, frente a la Plaza Bolívar...\" value=\"{{ localizadaCalleText }}\" oninput=\"{{ setLocalizadaCalleText }}\" style=\"width:100%;background:var(--einput);border:1.5px solid var(--eborder);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--etext)\">\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div>\n            <label for=\"lc\" style=\"font-size:13px;font-weight:600;color:var(--etext);display:block;margin-bottom:7px\">¿Cómo te comunicaste o quién lo confirmó? <span style=\"color:#C41A1A\">*<\u002Fspan><\u002Flabel>\n            <textarea id=\"lc\" required=\"\" placeholder=\"Ej: Hablé por teléfono con su hermana, está en el refugio de Chacao. O: lo vi en persona en el centro médico.\" style=\"width:100%;background:var(--einput);border <script>
(function() {
  function mountDonate() {
    if (document.getElementById('__donate-fab')) return;

      '@keyframes fabIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}',

      '#__donate-tooltip strong{display:block;margin-bottom:3px;font-size:14px}',

      '#__donate-tooltip .tip-links a:hover{background:rgba(255,255,255,.2)}',

      '#__donate-btn:hover{transform:scale(1.04);opacity:.92}',
      '@media(max-width:480px){#__donate-fab{bottom:18px;right:14px}#__donate-tooltip{max-width:calc(100vw - 60px)}}'

    var tooltip = document.createElement('div');

    tooltip.style.display = 'none';
